name: "✨ Feature Request"
description: "Suggest a new feature or enhancement for GPS"
title: "[Feature]: "
labels: ["enhancement"]
assignees: ["Adithshajee"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide as much detail as possible to help us evaluate and implement it.

  - type: textarea
    id: problem
    attributes:
      label: "Problem Statement"
      description: "Is your feature request related to a problem? Describe it."
      placeholder: "When using GPS, I cannot easily..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "Describe the feature or solution you'd like."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: "Feature Category"
      options:
        - "New Provider (e.g. DEV.to, Medium, StackOverflow)"
        - "GitHub Provider Enhancement"
        - "Hugging Face Provider Enhancement"
        - "Kaggle Provider Enhancement"
        - "CLI Improvement"
        - "README Rendering / Sections"
        - "Configuration / gps.yml"
        - "GitHub Actions / CI"
        - "Documentation"
        - "Developer Experience"
        - "Performance"
        - "Security"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "Any alternative solutions or workarounds you've tried?"

  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Any other information, mockups, or references?"

  - type: checkboxes
    id: checklist
    attributes:
      label: "Pre-submission Checklist"
      options:
        - label: "I searched existing issues/discussions and this is not a duplicate."
          required: true
        - label: "This feature aligns with the GPS roadmap (developer identity platform)."
          required: false
