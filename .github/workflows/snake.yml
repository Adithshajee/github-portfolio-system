name: "Generate Contribution Snake"

on:
  schedule:
    # Run once every 24 hours at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/snake.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    name: Generate Contribution Grid Snake
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Generate GitHub Contribution Grid Snake
        uses: platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-contribution-grid-snake.svg
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit and Push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet && echo "No changes to commit" && exit 0
          git add assets/github-contribution-grid-snake.svg assets/github-contribution-grid-snake-dark.svg
          git commit -m "chore(assets): update contribution snake animations [skip ci]"
          git push

      - name: Write Job Summary
        if: always()
        run: |
          echo "## Snake Generation" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Light**: assets/github-contribution-grid-snake.svg" >> $GITHUB_STEP_SUMMARY
          echo "- **Dark**: assets/github-contribution-grid-snake-dark.svg" >> $GITHUB_STEP_SUMMARY
