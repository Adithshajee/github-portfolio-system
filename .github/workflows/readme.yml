name: "Auto-Update Profile README"

on:
  schedule:
    # Run every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/gps/**"
      - "automation/update_readme.py"
      - "profile/README.md"
      - "gps.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-readme:
    name: Update Profile README
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install GPS
        run: pip install -e ".[dev]"

      - name: Validate Configuration
        run: gps validate
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Run GPS Engine
        run: gps run
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GPS_USERNAME: ${{ github.repository_owner }}

      - name: Commit and Push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet && echo "No changes to commit" && exit 0
          git add profile/README.md
          git commit -m "chore(readme): auto-update active projects section [skip ci]"
          git push

      - name: Write Job Summary
        if: always()
        run: |
          echo "## GPS README Update" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
