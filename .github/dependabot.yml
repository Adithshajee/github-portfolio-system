version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore(ci)"

  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      python-dependencies:
        patterns: ["*"]
    ignore:
      # Major version bumps for Pydantic require explicit review
      - dependency-name: "pydantic"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
