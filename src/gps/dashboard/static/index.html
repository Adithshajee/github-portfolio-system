<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPS Developer Identity Platform Dashboard</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel for JSX compilation in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Marked Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Google Font: Outfit & Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    h1, h2, h3, h4, .font-display {
      font-family: 'Outfit', sans-serif;
    }
    /* Glassmorphism custom utilities */
    .glass-card {
      background: rgba(15, 23, 42, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glass-input {
      background: rgba(30, 41, 59, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glass-input:focus {
      border-color: rgba(99, 102, 241, 0.6);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15);
    }
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased h-screen overflow-hidden">
  <div id="root" class="h-full"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      // Configuration state
      const [config, setConfig] = useState({
        username: "",
        readme_path: "profile/README.md",
        timezone: "UTC",
        theme: { name: "swe_general", variant: "dark" },
        providers: {
          github: { enabled: true, repo_count: 5 },
          huggingface: { enabled: false, username: "" },
          kaggle: { enabled: false, username: "" },
          leetcode: { enabled: false, username: "" },
          blog: { enabled: false, feed_url: "" }
        },
        sections: {
          order: ["hero", "professional_overview", "skills", "active_repos", "contact"]
        }
      });

      // UI states
      const [activeTab, setActiveTab] = useState("profile");
      const [previewMd, setPreviewMd] = useState("");
      const [previewMode, setPreviewMode] = useState("desktop");
      const [previewTheme, setPreviewTheme] = useState("dark");
      const [doctorStatus, setDoctorStatus] = useState(null);
      const [aiHealth, setAiHealth] = useState(null);
      const [history, setHistory] = useState([]);
      const [historyPointer, setHistoryPointer] = useState(-1);
      const [aiRole, setAiRole] = useState("swe_general");
      const [aiSkills, setAiSkills] = useState("");
      const [autoDetectUser, setAutoDetectUser] = useState("");
      const [isGenerating, setIsGenerating] = useState(false);
      const [isDetecting, setIsDetecting] = useState(false);

      // Widgets states
      const [enabledWidgets, setEnabledWidgets] = useState([
        { id: "github_stats", name: "GitHub Stats", size: "normal" },
        { id: "snake", name: "Snake Grid", size: "normal" },
        { id: "tech_stack", name: "Tech Stack", size: "normal" }
      ]);

      // Load config on mount
      useEffect(() => {
        fetch("/api/config")
          .then(res => res.json())
          .then(data => {
            setConfig(data);
            pushHistory(data);
            fetchAiHealth(data);
          });
      }, []);

      // Trigger preview update whenever config changes
      useEffect(() => {
        fetch("/api/preview", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(config)
        })
          .then(res => res.json())
          .then(data => setPreviewMd(data.markdown || ""));
      }, [config]);

      // Fetch AI identity scores
      const fetchAiHealth = (cfg) => {
        fetch("/api/ai/health", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(cfg || config)
        })
          .then(res => res.json())
          .then(data => setAiHealth(data))
          .catch(err => console.error("Identity score failed:", err));
      };

      // State History helpers
      const pushHistory = (newConfig) => {
        const nextHist = history.slice(0, historyPointer + 1);
        nextHist.push(JSON.parse(JSON.stringify(newConfig)));
        setHistory(nextHist);
        setHistoryPointer(nextHist.length - 1);
      };

      const handleUndo = () => {
        if (historyPointer > 0) {
          const nextPtr = historyPointer - 1;
          setHistoryPointer(nextPtr);
          setConfig(JSON.parse(JSON.stringify(history[nextPtr])));
          fetchAiHealth(history[nextPtr]);
        }
      };

      const handleRedo = () => {
        if (historyPointer < history.length - 1) {
          const nextPtr = historyPointer + 1;
          setHistoryPointer(nextPtr);
          setConfig(JSON.parse(JSON.stringify(history[nextPtr])));
          fetchAiHealth(history[nextPtr]);
        }
      };

      const updateConfig = (updater) => {
        const next = JSON.parse(JSON.stringify(config));
        updater(next);
        setConfig(next);
        pushHistory(next);
        fetchAiHealth(next);
      };

      // Save/Generate profiles
      const handleGenerate = () => {
        setIsGenerating(true);
        fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(config)
        })
          .then(res => res.json())
          .then(data => {
            setIsGenerating(false);
            alert("✨ Success! Profile README generated successfully.");
          })
          .catch(err => {
            setIsGenerating(false);
            alert("Error generating profile: " + err.message);
          });
      };

      // Run Diagnostics Doctor
      const handleRunDoctor = () => {
        fetch("/api/doctor")
          .then(res => res.json())
          .then(data => setDoctorStatus(data));
      };

      // Auto detect user details
      const handleAutoDetect = () => {
        if (!autoDetectUser.trim()) return;
        setIsDetecting(true);
        fetch(`/api/detect?username=${autoDetectUser}`)
          .then(res => res.json())
          .then(data => {
            setIsDetecting(false);
            updateConfig(cfg => {
              cfg.username = autoDetectUser;
              cfg.providers.github.enabled = data.github.enabled;
              cfg.providers.huggingface.enabled = data.huggingface.enabled;
              cfg.providers.huggingface.username = data.huggingface.username || autoDetectUser;
              cfg.providers.leetcode.enabled = data.leetcode.enabled;
              cfg.providers.leetcode.username = data.leetcode.username || autoDetectUser;
            });
            alert("🚀 Auto-detection finished! Configuration populated.");
          })
          .catch(err => {
            setIsDetecting(false);
            alert("Auto-detection failed: " + err.message);
          });
      };

      // AI Optimizer Agent
      const handleAIOptimize = () => {
        const skillsList = aiSkills.split(",").map(s => s.trim()).filter(Boolean);
        fetch("/api/ai/optimize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: config.username || "Developer",
            role: aiRole,
            skills: skillsList,
            repos: [] 
          })
        })
          .then(res => res.json())
          .then(data => {
            updateConfig(cfg => {
              cfg.theme.name = data.theme_recommendation;
              if (data.config_diff && data.config_diff.sections) {
                cfg.sections = { ...cfg.sections, ...data.config_diff.sections };
              }
            });
            alert(`🧠 AI Optimization Advised:\n${data.explanation}`);
          });
      };

      // Drag and drop helper lists
      const handleAddWidget = (id, name) => {
        setEnabledWidgets([...enabledWidgets, { id, name, size: "normal" }]);
      };

      const handleRemoveWidget = (idx) => {
        const next = [...enabledWidgets];
        next.splice(idx, 1);
        setEnabledWidgets(next);
      };

      return (
        <div class="flex flex-col h-full bg-slate-950 text-slate-100 font-sans selection:bg-indigo-500 selection:text-white">
          {/* Header Bar */}
          <header class="flex items-center justify-between px-6 py-4 bg-slate-900 border-b border-slate-800/80 shadow-lg z-10">
            <div class="flex items-center space-x-3">
              <div class="h-9 w-9 rounded-lg bg-gradient-to-tr from-indigo-500 to-violet-500 flex items-center justify-center shadow-md">
                <span class="text-white font-bold text-lg font-display">G</span>
              </div>
              <div>
                <span class="text-lg font-extrabold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent tracking-tight">
                  GPS Identity Studio
                </span>
                <span class="text-xs bg-slate-800 text-slate-400 px-2 py-0.5 rounded ml-2 font-medium">v3.0.0</span>
              </div>
            </div>
            
            <div class="flex items-center space-x-3">
              <button 
                onClick={handleUndo} 
                disabled={historyPointer <= 0}
                class="text-xs font-semibold bg-slate-800 hover:bg-slate-700 disabled:opacity-50 disabled:cursor-not-allowed px-3.5 py-2 rounded-lg border border-slate-700 transition"
              >
                Undo
              </button>
              <button 
                onClick={handleRedo} 
                disabled={historyPointer >= history.length - 1}
                class="text-xs font-semibold bg-slate-800 hover:bg-slate-700 disabled:opacity-50 disabled:cursor-not-allowed px-3.5 py-2 rounded-lg border border-slate-700 transition"
              >
                Redo
              </button>
              <button 
                onClick={handleGenerate} 
                class="bg-indigo-600 hover:bg-indigo-500 text-white shadow-md shadow-indigo-600/20 px-5 py-2 rounded-lg text-xs font-bold transition flex items-center space-x-2"
                disabled={isGenerating}
              >
                <span>{isGenerating ? "Generating..." : "Generate Portfolio"}</span>
              </button>
            </div>
          </header>

          {/* Main Layout Workspace */}
          <div class="flex flex-1 overflow-hidden">
            
            {/* Left Control Panels Sidebar */}
            <aside class="w-80 bg-slate-900/60 border-r border-slate-850 flex flex-col z-10 glass-card">
              <nav class="flex border-b border-slate-800/80 text-xs font-bold uppercase tracking-wider">
                {[
                  { id: "profile", label: "Editor" },
                  { id: "marketplace", label: "Marketplace" },
                  { id: "ai", label: "AI Advisor" },
                  { id: "doctor", label: "Doctor" }
                ].map(tab => (
                  <button 
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)} 
                    class={`flex-1 py-3.5 text-center border-b-2 transition ${activeTab === tab.id ? "border-indigo-500 text-indigo-400" : "border-transparent text-slate-400 hover:text-slate-200"}`}
                  >
                    {tab.label}
                  </button>
                ))}
              </nav>

              <div class="flex-1 overflow-y-auto p-5 space-y-5">
                {activeTab === "profile" && (
                  <div class="space-y-5">
                    <div>
                      <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider mb-2.5">Platform Username</h3>
                      <label class="block text-[11px] text-slate-500 mb-1">GitHub Account</label>
                      <input 
                        type="text" 
                        value={config.username}
                        onChange={e => updateConfig(cfg => { cfg.username = e.target.value; })}
                        class="w-full bg-slate-800/65 border border-slate-700/60 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition"
                      />
                    </div>

                    <div>
                      <label class="block text-[11px] text-slate-500 mb-1">README Destination Path</label>
                      <input 
                        type="text" 
                        value={config.readme_path}
                        onChange={e => updateConfig(cfg => { cfg.readme_path = e.target.value; })}
                        class="w-full bg-slate-800/65 border border-slate-700/60 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition"
                      />
                    </div>

                    <div class="pt-4 border-t border-slate-800/80">
                      <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider mb-3">Integrations</h3>
                      <div class="space-y-3">
                        <div class="space-y-2">
                          <label class="flex items-center space-x-2 text-xs font-semibold cursor-pointer">
                            <input 
                              type="checkbox" 
                              checked={config.providers.huggingface.enabled}
                              onChange={e => updateConfig(cfg => { cfg.providers.huggingface.enabled = e.target.checked; })}
                              class="rounded border-slate-700 bg-slate-800 text-indigo-600 focus:ring-indigo-500"
                            />
                            <span>Hugging Face</span>
                          </label>
                          {config.providers.huggingface.enabled && (
                            <input 
                              type="text" 
                              placeholder="HF Username"
                              value={config.providers.huggingface.username || ""}
                              onChange={e => updateConfig(cfg => { cfg.providers.huggingface.username = e.target.value; })}
                              class="w-full bg-slate-850 border border-slate-750 rounded-lg px-2.5 py-1.5 text-xs text-slate-100 focus:outline-none"
                            />
                          )}
                        </div>

                        <div class="space-y-2">
                          <label class="flex items-center space-x-2 text-xs font-semibold cursor-pointer">
                            <input 
                              type="checkbox" 
                              checked={config.providers.leetcode.enabled}
                              onChange={e => updateConfig(cfg => { cfg.providers.leetcode.enabled = e.target.checked; })}
                              class="rounded border-slate-700 bg-slate-800 text-indigo-600 focus:ring-indigo-500"
                            />
                            <span>LeetCode Stats</span>
                          </label>
                          {config.providers.leetcode.enabled && (
                            <input 
                              type="text" 
                              placeholder="LeetCode Username"
                              value={config.providers.leetcode.username || ""}
                              onChange={e => updateConfig(cfg => { cfg.providers.leetcode.username = e.target.value; })}
                              class="w-full bg-slate-850 border border-slate-750 rounded-lg px-2.5 py-1.5 text-xs text-slate-100 focus:outline-none"
                            />
                          )}
                        </div>

                        <div class="space-y-2">
                          <label class="flex items-center space-x-2 text-xs font-semibold cursor-pointer">
                            <input 
                              type="checkbox" 
                              checked={config.providers.blog.enabled}
                              onChange={e => updateConfig(cfg => { cfg.providers.blog.enabled = e.target.checked; })}
                              class="rounded border-slate-700 bg-slate-800 text-indigo-600 focus:ring-indigo-500"
                            />
                            <span>Blog RSS Feed</span>
                          </label>
                          {config.providers.blog.enabled && (
                            <input 
                              type="text" 
                              placeholder="https://feedurl.com/rss"
                              value={config.providers.blog.feed_url || ""}
                              onChange={e => updateConfig(cfg => { cfg.providers.blog.feed_url = e.target.value; })}
                              class="w-full bg-slate-850 border border-slate-750 rounded-lg px-2.5 py-1.5 text-xs text-slate-100 focus:outline-none"
                            />
                          )}
                        </div>
                      </div>
                    </div>

                    <div class="pt-4 border-t border-slate-800/80">
                      <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider mb-2.5">Auto-Discovery</h3>
                      <input 
                        type="text" 
                        placeholder="GitHub Account ID"
                        value={autoDetectUser}
                        onChange={e => setAutoDetectUser(e.target.value)}
                        class="w-full bg-slate-800/65 border border-slate-700/60 rounded-lg px-3 py-2 text-sm text-slate-100 mb-2 focus:outline-none"
                      />
                      <button 
                        onClick={handleAutoDetect}
                        disabled={isDetecting}
                        class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white py-2 rounded-lg text-xs font-semibold transition shadow-md shadow-indigo-600/10"
                      >
                        {isDetecting ? "Discovering..." : "Scan Account"}
                      </button>
                    </div>
                  </div>
                )}

                {activeTab === "marketplace" && (
                  <div class="space-y-5">
                    <div>
                      <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider mb-3">Widgets Deck</h3>
                      <div class="grid grid-cols-1 gap-2.5">
                        {[
                          { id: "github_stats", name: "GitHub Stats" },
                          { id: "snake", name: "Snake Grid" },
                          { id: "metrics", name: "Metrics" },
                          { id: "languages", name: "Languages" },
                          { id: "roadmap", name: "Roadmap" },
                          { id: "tech_stack", name: "Tech Stack" },
                          { id: "visitors", name: "Visitors" },
                          { id: "sponsors", name: "Sponsors" },
                          { id: "achievements", name: "Achievements" }
                        ].map(widgetItem => (
                          <div 
                            key={widgetItem.id}
                            class="flex items-center justify-between p-2.5 rounded-lg border border-slate-800 bg-slate-900/40 text-xs"
                          >
                            <span>{widgetItem.name}</span>
                            <button 
                              onClick={() => handleAddWidget(widgetItem.id, widgetItem.name)}
                              class="text-indigo-400 hover:text-indigo-300 font-bold"
                            >
                              + Add
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === "ai" && (
                  <div class="space-y-5">
                    <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider">Career Optimization</h3>
                    <div>
                      <label class="block text-[11px] text-slate-500 mb-1">Target Development Role</label>
                      <select 
                        value={aiRole}
                        onChange={e => setAiRole(e.target.value)}
                        class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none"
                      >
                        <option value="swe_general">Software Engineer</option>
                        <option value="ai_engineer">AI/ML Engineer</option>
                        <option value="devops">DevOps Engineer</option>
                      </select>
                    </div>

                    <div>
                      <label class="block text-[11px] text-slate-500 mb-1">Core Tech Stack Skills</label>
                      <input 
                        type="text" 
                        placeholder="Python, PyTorch, Docker, MLOps"
                        value={aiSkills}
                        onChange={e => setAiSkills(e.target.value)}
                        class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none"
                      />
                    </div>

                    <button 
                      onClick={handleAIOptimize}
                      class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-2.5 rounded-lg text-xs font-semibold transition shadow-md shadow-indigo-600/10"
                    >
                      Optimize Profile
                    </button>
                  </div>
                )}

                {activeTab === "doctor" && (
                  <div class="space-y-5">
                    <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider">Health Audit diagnostics</h3>
                    <button 
                      onClick={handleRunDoctor}
                      class="w-full bg-slate-800 hover:bg-slate-750 border border-slate-700 py-2.5 rounded-lg text-xs font-semibold transition"
                    >
                      Run Health Checkup
                    </button>

                    {doctorStatus && (
                      <div class="space-y-2 text-xs border border-slate-800/80 rounded-lg p-3 bg-slate-900/30">
                        <div class="flex justify-between">
                          <span class="text-slate-400">Environment status:</span>
                          <span class={doctorStatus.doctor.python_ok ? "text-green-500 font-bold" : "text-red-500 font-bold"}>
                            {doctorStatus.doctor.python_ok ? "PASSED" : "FAILED"}
                          </span>
                        </div>
                        <div class="flex justify-between">
                          <span class="text-slate-400">Config validation:</span>
                          <span class={doctorStatus.doctor.config_valid ? "text-green-500 font-bold" : "text-red-500 font-bold"}>
                            {doctorStatus.doctor.config_valid ? "PASSED" : "FAILED"}
                          </span>
                        </div>
                        <div class="flex justify-between">
                          <span class="text-slate-400">README markers:</span>
                          <span class={doctorStatus.doctor.markers_valid ? "text-green-500 font-bold" : "text-red-500 font-bold"}>
                            {doctorStatus.doctor.markers_valid ? "PASSED" : "FAILED"}
                          </span>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </aside>

            {/* Center Live Preview Panel */}
            <main class="flex-1 flex flex-col bg-slate-950 overflow-hidden relative">
              {/* Preview controls */}
              <div class="flex items-center justify-between px-6 py-3 border-b border-slate-800/80 bg-slate-900/40 backdrop-blur-md">
                <div class="flex space-x-2">
                  <button 
                    onClick={() => setPreviewMode("desktop")} 
                    class={`text-xs px-3.5 py-1.5 rounded-lg transition font-medium ${previewMode === "desktop" ? "bg-slate-800 text-indigo-400 font-bold" : "text-slate-400 hover:text-slate-200"}`}
                  >
                    Desktop view
                  </button>
                  <button 
                    onClick={() => setPreviewMode("mobile")} 
                    class={`text-xs px-3.5 py-1.5 rounded-lg transition font-medium ${previewMode === "mobile" ? "bg-slate-800 text-indigo-400 font-bold" : "text-slate-400 hover:text-slate-200"}`}
                  >
                    Mobile viewport
                  </button>
                  <button 
                    onClick={() => setPreviewMode("scores")} 
                    class={`text-xs px-3.5 py-1.5 rounded-lg transition font-medium ${previewMode === "scores" ? "bg-indigo-600 text-white font-bold" : "text-slate-400 hover:text-slate-200"}`}
                  >
                    Identity Analytics
                  </button>
                </div>

                {previewMode !== "scores" && (
                  <div class="flex space-x-2">
                    <button 
                      onClick={() => setPreviewTheme("dark")} 
                      class={`text-xs px-3 py-1 rounded transition ${previewTheme === "dark" ? "bg-slate-800 text-slate-100 font-bold" : "text-slate-400 hover:text-slate-200"}`}
                    >
                      Dark mode
                    </button>
                    <button 
                      onClick={() => setPreviewTheme("light")} 
                      class={`text-xs px-3 py-1 rounded transition ${previewTheme === "light" ? "bg-slate-800 text-slate-100 font-bold" : "text-slate-400 hover:text-slate-200"}`}
                    >
                      Light mode
                    </button>
                  </div>
                )}
              </div>

              {/* Rendered Preview content */}
              <div class="flex-1 overflow-y-auto p-8 flex justify-center items-start">
                {previewMode === "scores" ? (
                  <div class="w-full max-w-4xl space-y-6">
                    {/* Developer Identity Score Cards */}
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                      <div class="p-6 rounded-2xl bg-gradient-to-tr from-slate-900 to-indigo-950 border border-indigo-900/30 shadow-xl flex flex-col justify-between">
                        <div>
                          <h4 class="text-xs font-bold uppercase text-indigo-400 tracking-wider mb-2">Developer Identity Score</h4>
                          <span class="text-5xl font-extrabold tracking-tight">{aiHealth?.identity?.score || 85}/100</span>
                        </div>
                        <p class="text-xs text-slate-400 mt-4 font-medium">Evaluates presence across platforms and showcases profile readiness.</p>
                      </div>

                      <div class="p-6 rounded-2xl bg-gradient-to-tr from-slate-900 to-slate-900/50 border border-slate-800 shadow-xl flex flex-col justify-between">
                        <div>
                          <h4 class="text-xs font-bold uppercase text-slate-400 tracking-wider mb-2">README Quality Score</h4>
                          <span class="text-5xl font-extrabold tracking-tight">{aiHealth?.readme?.score || 91}/100</span>
                        </div>
                        <p class="text-xs text-slate-400 mt-4 font-medium">Scores markdown assets for installation docs, badges, and examples.</p>
                      </div>

                      <div class="p-6 rounded-2xl bg-gradient-to-tr from-slate-900 to-slate-900/50 border border-slate-800 shadow-xl flex flex-col justify-between">
                        <div>
                          <h4 class="text-xs font-bold uppercase text-slate-400 tracking-wider mb-2">AetherOS Health</h4>
                          <span class="text-5xl font-extrabold tracking-tight">{aiHealth?.repository?.score || 90}/100</span>
                        </div>
                        <p class="text-xs text-slate-400 mt-4 font-medium">Audits documentation, health, and developer accessibility stats.</p>
                      </div>
                    </div>

                    {/* Breakdown list */}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                      <div class="p-6 rounded-2xl border border-slate-800 bg-slate-900/40 backdrop-blur shadow-xl space-y-4">
                        <h4 class="text-sm font-bold uppercase tracking-wider text-slate-300">Identity Audit Findings</h4>
                        <div class="space-y-2">
                          <h5 class="text-xs font-bold text-green-400">✓ Strengths</h5>
                          <ul class="text-xs text-slate-300 list-disc list-inside space-y-1">
                            {(aiHealth?.identity?.strengths || []).map((s, idx) => (
                              <li key={idx}>{s}</li>
                            ))}
                          </ul>
                        </div>
                        <div class="space-y-2 pt-2 border-t border-slate-800/80">
                          <h5 class="text-xs font-bold text-rose-400">✗ Weaknesses</h5>
                          <ul class="text-xs text-slate-300 list-disc list-inside space-y-1">
                            {(aiHealth?.identity?.weaknesses || []).map((w, idx) => (
                              <li key={idx}>{w}</li>
                            ))}
                          </ul>
                        </div>
                      </div>

                      <div class="p-6 rounded-2xl border border-slate-800 bg-slate-900/40 backdrop-blur shadow-xl space-y-4">
                        <h4 class="text-sm font-bold uppercase tracking-wider text-slate-300">Identity recommendations</h4>
                        <ul class="text-xs text-slate-300 list-disc list-inside space-y-2">
                          {(aiHealth?.identity?.recommendations || []).map((r, idx) => (
                            <li key={idx} class="leading-relaxed">{r}</li>
                          ))}
                        </ul>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div 
                    class={`w-full transition-all duration-300 p-8 rounded-2xl shadow-2xl border ${previewMode === "mobile" ? "max-w-sm" : "max-w-4xl"} ${previewTheme === "dark" ? "bg-slate-900 border-slate-800/60 text-slate-100" : "bg-white border-slate-200 text-slate-900"}`}
                  >
                    {/* GitHub Profile layout mock header */}
                    <div class="flex items-center space-x-4 border-b pb-4 mb-6 border-slate-800/10">
                      <div class="h-12 w-12 rounded-full bg-slate-700 animate-pulse" />
                      <div>
                        <h2 class="font-bold text-lg">{config.username || "Adithshajee"}</h2>
                        <p class="text-xs text-slate-500">Developer Profile README Preview</p>
                      </div>
                    </div>

                    {/* Rendered markdown sections content */}
                    <div 
                      class="prose prose-invert max-w-none text-sm space-y-4"
                      dangerouslySetInnerHTML={{ __html: marked.parse(previewMd || "") }}
                    />
                  </div>
                )}
              </div>
            </main>

            {/* Right Properties Panel */}
            <aside class="w-64 bg-slate-900/60 border-l border-slate-850 p-5 space-y-5 glass-card">
              <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider">Properties</h3>
              
              <div>
                <label class="block text-[11px] text-slate-500 mb-1.5">Theme catalog</label>
                <select 
                  value={config.theme.name}
                  onChange={e => updateConfig(cfg => { cfg.theme.name = e.target.value; })}
                  class="w-full bg-slate-800 border border-slate-700 rounded-lg px-2.5 py-1.5 text-xs focus:outline-none"
                >
                  <option value="swe_general">Software Engineer Classic</option>
                  <option value="ai_ml">AI & ML Specialist</option>
                  <option value="devops">Cloud & DevOps Architect</option>
                  <option value="apple">Apple Clean Design</option>
                  <option value="cyberpunk">Cyberpunk Neon</option>
                </select>
              </div>

              <div>
                <label class="block text-[11px] text-slate-500 mb-1.5">Theme Variant</label>
                <select 
                  value={config.theme.variant}
                  onChange={e => updateConfig(cfg => { cfg.theme.variant = e.target.value; })}
                  class="w-full bg-slate-800 border border-slate-700 rounded-lg px-2.5 py-1.5 text-xs text-slate-100 focus:outline-none"
                >
                  <option value="dark">Dark Variant</option>
                  <option value="light">Light Variant</option>
                </select>
              </div>

              <div>
                <label class="block text-[11px] text-slate-500 mb-2">Visual Section Ordering</label>
                <div class="space-y-1.5">
                  {config.sections.order.map((section, idx) => (
                    <div key={section} class="flex items-center justify-between bg-slate-800/70 border border-slate-750 px-3 py-2 rounded-lg text-xs">
                      <span class="font-medium">{section}</span>
                      <div class="flex space-x-1.5">
                        <button 
                          onClick={() => updateConfig(cfg => {
                            if (idx > 0) {
                              const order = cfg.sections.order;
                              [order[idx - 1], order[idx]] = [order[idx], order[idx - 1]];
                            }
                          })}
                          class="hover:text-indigo-400 text-[10px]"
                        >
                          ▲
                        </button>
                        <button 
                          onClick={() => updateConfig(cfg => {
                            if (idx < cfg.sections.order.length - 1) {
                              const order = cfg.sections.order;
                              [order[idx + 1], order[idx]] = [order[idx], order[idx + 1]];
                            }
                          })}
                          class="hover:text-indigo-400 text-[10px]"
                        >
                          ▼
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {enabledWidgets.length > 0 && (
                <div class="pt-4 border-t border-slate-800/80">
                  <label class="block text-[11px] text-slate-500 mb-2">Enabled Widgets</label>
                  <div class="space-y-1.5">
                    {enabledWidgets.map((w, idx) => (
                      <div key={idx} class="flex items-center justify-between bg-slate-800/50 px-2.5 py-1.5 rounded text-[11px] border border-slate-800">
                        <span>{w.name}</span>
                        <button 
                          onClick={() => handleRemoveWidget(idx)}
                          class="text-rose-400 hover:text-rose-300"
                        >
                          × Remove
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </aside>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
